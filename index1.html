<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      :root {
        --navy: #1a2a4a;
        --charcoal: #2d3748;
        --accent: #3b82f6;
        --accent-dark: #2563eb;
        --light-gray: #f7f8fa;
        --border: #e2e8f0;
        --text: #1a202c;
        --text-muted: #64748b;
        --white: #ffffff;
        --body-bg: #edf2f7;
        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background: var(--body-bg);
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      .app-shell { min-height: 100vh; padding: 18px; }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        margin-bottom: 16px;
        border-radius: 16px;
        background: var(--navy);
        color: var(--white);
        box-shadow: 0 10px 28px rgba(26, 42, 74, 0.2);
      }
      .toolbar h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 700;
      }
      .toolbar p {
        margin: 4px 0 0;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.8);
      }
      .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
        border: 0;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.9rem;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }
      .btn:hover { transform: translateY(-1px); }
      .btn.primary { background: var(--accent); color: var(--white); }
      .btn.primary:hover { background: var(--accent-dark); }
      .btn.secondary { background: rgba(255, 255, 255, 0.14); color: var(--white); }
      .btn.secondary:hover { background: rgba(255, 255, 255, 0.24); }
      .btn.success { background: #10b981; color: var(--white); }
      .btn.success:hover { background: #059669; }
      .btn.danger { background: #ef4444; color: var(--white); }
      .btn.danger:hover { background: #dc2626; }

      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }
      .layout.editor-collapsed { grid-template-columns: 0 minmax(0, 1fr); }

      .editor-panel {
        position: sticky;
        top: 94px;
        max-height: calc(100vh - 116px);
        overflow: auto;
        padding-right: 6px;
        transition: opacity 0.25s ease, flex-basis 0.25s ease, width 0.25s ease;
        scrollbar-width: thin;
        scrollbar-color: #ced7e2 transparent;
      }
      .editor-panel.collapsed {
        width: 0;
        min-width: 0;
        opacity: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .editor-panel::-webkit-scrollbar { width: 6px; }
      .editor-panel::-webkit-scrollbar-track { background: transparent; }
      .editor-panel::-webkit-scrollbar-thumb { background: #d9e2ea; border-radius: 999px; }

      .editor-scroll { display: flex; flex-direction: column; gap: 10px; }
      .editor-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .editor-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        border: 0;
        background: var(--light-gray);
        color: var(--navy);
        padding: 12px 14px;
        font-weight: 700;
      }
      .editor-card-header .icon { font-size: 1rem; margin-right: 6px; }
      .editor-card-header .arrow {
        display: inline-block;
        transition: transform 0.2s ease;
        font-size: 0.9rem;
      }
      .editor-card.collapsed .editor-card-header .arrow { transform: rotate(-90deg); }
      .editor-card-body { padding: 14px; display: grid; gap: 10px; }
      .editor-card.collapsed .editor-card-body { display: none; }

      .field { display: grid; gap: 6px; }
      .field label {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--charcoal);
      }
      .field input,
      .field textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 9px 10px;
        color: var(--text);
        background: var(--white);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .field textarea { min-height: 88px; resize: vertical; }
      .field input:focus,
      .field textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.16);
      }
      .field-row { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .help-text { font-size: 0.8rem; color: var(--text-muted); }
      .btn-small {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 7px 11px;
        background: var(--white);
        color: var(--charcoal);
        font-size: 0.82rem;
      }
      .btn-small:hover { background: var(--light-gray); }
      .btn-small.primary { border-color: var(--accent); color: var(--accent); }
      .sub-card {
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--light-gray);
        display: grid;
        gap: 8px;
      }
      .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip {
        padding: 6px 9px;
        border-radius: 999px;
        background: var(--white);
        border: 1px solid var(--border);
        color: var(--charcoal);
        font-size: 0.8rem;
      }

      .photo-dropzone {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px dashed var(--border);
        border-radius: var(--radius-lg);
        background: var(--light-gray);
        text-align: center;
        color: var(--text-muted);
      }
      .photo-dropzone.dragover { border-color: var(--accent); background: rgba(59, 130, 246, 0.08); }
      .photo-dropzone button { justify-self: center; }
      .photo-preview {
        width: 120px;
        height: 120px;
        margin: 0 auto;
        overflow: hidden;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
      }
      .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
      .photo-preview.circle img { border-radius: 50%; }
      .photo-preview.rounded img { border-radius: 12px; }
      .photo-preview.square img { border-radius: 4px; }
      .shape-row { display: flex; flex-wrap: wrap; gap: 8px; }
      .shape-btn {
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--charcoal);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
      }
      .shape-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }

      .preview-panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 12px;
      }
      .preview-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        padding: 8px 4px;
      }
      .preview-toolbar strong { color: var(--navy); }
      .preview-toolbar .help-text { margin-top: 2px; }
      .resume-page {
        width: 100%;
        max-width: 210mm;
        min-height: 297mm;
        margin: 0 auto;
        padding: 32px 40px;
        background: var(--white);
        color: var(--text);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.16);
        border-radius: 10px;
      }
      .resume-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--navy);
      }
      .resume-name {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--navy);
      }
      .resume-title {
        margin: 6px 0 8px;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .resume-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 0.7rem;
        color: var(--text-muted);
      }
      .resume-contact span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .resume-photo {
        width: 90px;
        height: 90px;
        min-width: 90px;
        overflow: hidden;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .resume-photo img { width: 100%; height: 100%; object-fit: cover; }
      .resume-photo.circle img { border-radius: 50%; }
      .resume-photo.rounded img { border-radius: 12px; }
      .resume-photo.square img { border-radius: 4px; }
      .resume-section { margin-top: 16px; }
      .section-title {
        margin: 0 0 8px;
        color: var(--navy);
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--border);
      }
      .summary-text {
        margin: 0;
        font-size: 0.63rem;
        line-height: 1.55;
        text-align: justify;
        white-space: pre-line;
      }
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 16px;
      }
      .skill-category strong { display: block; color: var(--navy); font-size: 0.65rem; margin-bottom: 3px; }
      .skill-category span { font-size: 0.6rem; color: var(--text-muted); line-height: 1.4; }
      .experience-entry { margin-bottom: 12px; }
      .experience-top { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
      .experience-role { font-size: 0.68rem; font-weight: 700; color: var(--text); }
      .experience-project { font-size: 0.62rem; color: var(--accent); font-weight: 700; margin: 2px 0 4px; }
      .experience-meta { font-size: 0.58rem; color: var(--text-muted); }
      .experience-bullets { margin: 6px 0 0 16px; padding: 0; }
      .experience-bullets li { font-size: 0.58rem; color: var(--charcoal); line-height: 1.45; margin-bottom: 4px; }
      .experience-bullets li::marker { color: var(--accent); }
      .achievements-grid {
        column-count: 2;
        column-gap: 18px;
      }
      .achievement-item {
        break-inside: avoid;
        margin-bottom: 8px;
        font-size: 0.58rem;
        color: var(--charcoal);
        line-height: 1.35;
      }
      .achievement-item::before { content: "★ "; color: var(--accent); font-weight: 700; }
      .tools-text, .education-text, .additional-text {
        font-size: 0.63rem;
        line-height: 1.55;
        color: var(--charcoal);
        white-space: pre-line;
      }
      .education-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
      .education-line strong { color: var(--navy); font-size: 0.63rem; }
      .education-line span { font-size: 0.58rem; color: var(--text-muted); }
      .hidden { display: none !important; }

      .toast-stack {
        position: fixed;
        right: 16px;
        bottom: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 50;
      }
      .toast {
        padding: 10px 12px;
        background: rgba(26, 42, 74, 0.95);
        color: var(--white);
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.22);
        font-size: 0.85rem;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .toast.show { opacity: 1; transform: translateY(0); }

      @media (max-width: 1200px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .editor-panel {
          position: static;
          max-height: none;
          width: 100%;
        }
        .layout.editor-collapsed { grid-template-columns: 1fr; }
      }

      @media print {
        body { background: var(--white); }
        .app-shell { padding: 0; }
        .toolbar, .editor-panel, .preview-toolbar, .toast-stack { display: none !important; }
        .preview-panel { border: 0; box-shadow: none; padding: 0; background: var(--white); }
        .resume-page {
          max-width: none;
          min-height: auto;
          padding: 20px 25px;
          box-shadow: none;
          border-radius: 0;
          font-size: 9.5pt;
        }
        .resume-section, .experience-entry { break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <div class="toast-stack" id="toastStack"></div>
    <div class="app-shell">
      <header class="toolbar">
        <div>
          <h1>Resume Builder</h1>
          <p>Build and export a polished resume from a single HTML file.</p>
        </div>
        <div class="toolbar-actions">
          <button class="btn secondary" id="toggleEditorBtn">Toggle Editor</button>
          <button class="btn success" id="downloadPdfBtn">Download PDF</button>
          <button class="btn secondary" id="printBtn">Print</button>
          <button class="btn danger" id="resetBtn">Reset to Default</button>
        </div>
      </header>

      <div class="layout" id="layout">
        <aside class="editor-panel" id="editorPanel">
          <div class="editor-scroll" id="editorSections"></div>
        </aside>

        <main class="preview-panel">
          <div class="preview-toolbar">
            <div>
              <strong>Live A4 Preview</strong>
              <div class="help-text">Every change updates instantly and is saved locally.</div>
            </div>
          </div>
          <div id="resumePreview"></div>
        </main>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "resume-builder-data-v1";
      const defaultResumeData = {
        ui: {
          editorCollapsed: false,
          collapsedSections: {
            profilePhoto: false,
            personalInfo: false,
            summary: false,
            skills: false,
            experience: false,
            achievements: false,
            tools: false,
            education: false,
            additional: false
          }
        },
        personalInfo: {
          name: "IPSIT KUMAR DHAL",
          title: "Guidewire Integration Developer | ClaimCenter | Guidewire Cloud",
          location: "Bengaluru / Remote",
          email: "ipsitdhal.bapi@gmail.com",
          phone: "+91 8456916821",
          linkedIn: ""
        },
        summary: {
          text: "Guidewire Integration Developer with 3+ years of experience in ClaimCenter, PolicyCenter, and Guidewire Cloud migration. Skilled in REST/SOAP integrations, AWS S3 file-based processing, batch workflows, messaging, OAuth2, WS-Security, mTLS, and JDK 21-compatible upgrades. Strong focus on delivering secure, scalable integrations, resolving production issues, and supporting cross-functional delivery for insurance transformation projects."
        },
        skills: [
          { category: "Guidewire", items: "ClaimCenter, PolicyCenter, Guidewire Cloud, Gosu, GUnit, Plugins, Batch Processing, Work Queues, Messaging" },
          { category: "Integration", items: "REST, SOAP, JAX-WS, AWS S3, OAuth2, WS-Security, mTLS, XML/JSON, Custom REST APIs" },
          { category: "Development", items: "Java, JDK 21, Gosu, SQL, Spring" },
          { category: "Tools", items: "Postman, SOAP UI, Datadog, Splunk, Git, TeamCity, JFrog" },
          { category: "Core", items: "Cloud Migration, Integration Modernization, Defect Analysis, Root Cause Analysis, Cross-Team Coordination" }
        ],
        experience: [
          {
            role: "Associate 2 – Guidewire Integration Developer",
            company: "PwC US",
            bullets: "Migrated ClaimCenter and PolicyCenter integrations to Guidewire Cloud across legacy analysis, cloud-compliant development, configuration, testing, and release readiness.\nDeveloped and modernized REST, SOAP, and S3-based file integrations, including custom REST APIs and client libraries for external systems.\nImplemented OAuth2, WS-Security, mTLS, proxies, runtime properties, and admin data for secure environment-specific integrations.\nSupported JDK 21-compatible integration upgrades and resolved migration-related defects in local, dry-run, and performance environments.\nPerformed root-cause analysis and coordinated dependencies across development, QA, security, infrastructure, and upstream/downstream teams."
          },
          {
            role: "Senior Software Engineer – Guidewire ClaimCenter Developer",
            company: "Capgemini",
            bullets: "Built and supported Guidewire ClaimCenter v10 integrations and production enhancements for insurance workflows.\nIntegrated an external repair-vendor platform using REST APIs, batch processes, work queues, and messaging.\nOptimized batch processing using Guidewire Admin Data and chunk processing, improving throughput significantly.\nHandled production defects, exception handling, and XML validation for external claim-system integrations."
          }
        ],
        achievements: "Delivered cloud-migration-ready integration patterns for insurance workloads.\nImproved batch throughput by around 15x using multithreaded S3 processing and chunk-based execution.\nResolved complex production issues through strong debugging, secure integration design, and cross-team coordination.",
        tools: "REST, SOAP, Java, Gosu, AWS S3, OAuth2, mTLS, Git, Postman, SOAP UI, Datadog, Splunk",
        education: "M.Tech – Machine Design, National Institute of Technology, Rourkela, 2020 – 2022\nB.Tech – Mechanical Engineering, Indira Gandhi Institute of Technology, Sarang, 2014 – 2018",
        certifications: "Guidewire Certified Associate - ClaimCenter\nAWS Certified Cloud Practitioner",
        additional: "Open to Guidewire integration, cloud migration, and enterprise integration engineering roles.",
        photo: "",
        photoShape: "rounded",
        photoName: ""
      };

      let resumeData = loadResumeData();
      const editorSections = document.getElementById("editorSections");
      const editorPanel = document.getElementById("editorPanel");
      const layout = document.getElementById("layout");
      const preview = document.getElementById("resumePreview");
      const toggleEditorBtn = document.getElementById("toggleEditorBtn");
      const downloadPdfBtn = document.getElementById("downloadPdfBtn");
      const printBtn = document.getElementById("printBtn");
      const resetBtn = document.getElementById("resetBtn");
      const toastStack = document.getElementById("toastStack");

      function loadResumeData() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (!stored) return structuredClone(defaultResumeData);
          const parsed = JSON.parse(stored);
          return {
            ...structuredClone(defaultResumeData),
            ...parsed,
            ui: {
              ...structuredClone(defaultResumeData.ui),
              ...(parsed.ui || {})
            },
            personalInfo: { ...structuredClone(defaultResumeData.personalInfo), ...(parsed.personalInfo || {}) },
            summary: { ...structuredClone(defaultResumeData.summary), ...(parsed.summary || {}) }
          };
        } catch (error) {
          console.warn("Unable to load stored resume data", error);
          return structuredClone(defaultResumeData);
        }
      }

      function saveResumeData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(resumeData));
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function init() {
        renderEditor();
        renderPreview();
        syncEditorState();
        bindEvents();
        showToast("Resume loaded from local storage.");
      }

      function bindEvents() {
        editorSections.addEventListener("click", handleEditorClick);
        editorSections.addEventListener("input", handleEditorInput);
        editorSections.addEventListener("change", handleEditorChange);
        editorSections.addEventListener("dragover", handleEditorDragOver);
        editorSections.addEventListener("dragleave", handleEditorDragLeave);
        editorSections.addEventListener("drop", handleEditorDrop);
        toggleEditorBtn.addEventListener("click", toggleEditor);
        downloadPdfBtn.addEventListener("click", downloadPdf);
        printBtn.addEventListener("click", () => window.print());
        resetBtn.addEventListener("click", resetResume);
      }

      function syncEditorState() {
        editorPanel.classList.toggle("collapsed", resumeData.ui.editorCollapsed);
        layout.classList.toggle("editor-collapsed", resumeData.ui.editorCollapsed);
        toggleEditorBtn.textContent = resumeData.ui.editorCollapsed ? "Show Editor" : "Hide Editor";
      }

      function toggleEditor() {
        resumeData.ui.editorCollapsed = !resumeData.ui.editorCollapsed;
        saveResumeData();
        syncEditorState();
      }

      function resetResume() {
        const shouldReset = window.confirm("Reset the resume builder to the default sample data?");
        if (!shouldReset) return;
        resumeData = structuredClone(defaultResumeData);
        saveResumeData();
        renderEditor();
        renderPreview();
        syncEditorState();
        showToast("Resume reset to default data.");
      }

      function handleEditorClick(event) {
        const toggleButton = event.target.closest(".editor-card-header");
        if (toggleButton) {
          const key = toggleButton.dataset.sectionKey;
          resumeData.ui.collapsedSections[key] = !resumeData.ui.collapsedSections[key];
          saveResumeData();
          renderEditor();
          return;
        }

        const addButton = event.target.closest("button[data-action='add-skill']");
        if (addButton) {
          resumeData.skills.push({ category: "", items: "" });
          saveResumeData();
          renderEditor();
          renderPreview();
          return;
        }

        const addExperienceButton = event.target.closest("button[data-action='add-experience']");
        if (addExperienceButton) {
          resumeData.experience.push({ role: "", company: "", bullets: "" });
          saveResumeData();
          renderEditor();
          renderPreview();
          return;
        }

        const photoAction = event.target.closest("button[data-action]");
        if (photoAction) {
          const action = photoAction.dataset.action;
          if (action === "choose-photo") {
            document.getElementById("photoInput").click();
            return;
          }
          if (action === "clear-photo") {
            resumeData.photo = "";
            resumeData.photoName = "";
            saveResumeData();
            renderEditor();
            renderPreview();
            showToast("Photo cleared.");
          }
        }

        const shapeButton = event.target.closest("button[data-shape]");
        if (shapeButton) {
          resumeData.photoShape = shapeButton.dataset.shape;
          saveResumeData();
          renderEditor();
          renderPreview();
        }
      }

      function handleEditorInput(event) {
        const target = event.target;
        const section = target.dataset.section;
        const field = target.dataset.field;
        const index = Number(target.dataset.index || 0);

        if (!section) return;

        if (section === "personal") {
          resumeData.personalInfo[field] = target.value;
        } else if (section === "summary") {
          resumeData.summary.text = target.value;
        } else if (section === "skills") {
          resumeData.skills[index][field] = target.value;
        } else if (section === "experience") {
          resumeData.experience[index][field] = target.value;
        } else if (section === "education") {
          resumeData[field] = target.value;
        } else if (section === "additional") {
          resumeData.additional = target.value;
        }

        saveResumeData();
        renderPreview();
      }

      function handleEditorChange(event) {
        const target = event.target;
        if (target.id === "photoInput") {
          uploadPhotoFile(target.files && target.files[0]);
        }
      }

      function handleEditorDragOver(event) {
        const zone = event.target.closest("#photoDropzone");
        if (!zone) return;
        event.preventDefault();
        zone.classList.add("dragover");
      }

      function handleEditorDragLeave(event) {
        const zone = event.target.closest("#photoDropzone");
        if (!zone) return;
        zone.classList.remove("dragover");
      }

      function handleEditorDrop(event) {
        const zone = event.target.closest("#photoDropzone");
        if (!zone) return;
        event.preventDefault();
        zone.classList.remove("dragover");
        uploadPhotoFile(event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0]);
      }

      function uploadPhotoFile(file) {
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          showToast("Please choose an image file.");
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          resumeData.photo = reader.result;
          resumeData.photoName = file.name;
          saveResumeData();
          renderEditor();
          renderPreview();
          showToast("Photo uploaded.");
        };
        reader.readAsDataURL(file);
      }

      function renderEditor() {
        const cards = [
          buildCard("profilePhoto", "📷", "Profile Photo", renderPhotoSection()),
          buildCard("personalInfo", "👤", "Personal Information", renderPersonalSection()),
          buildCard("summary", "✍️", "Professional Summary", renderSummarySection()),
          buildCard("skills", "🛠️", "Skills", renderSkillsSection()),
          buildCard("experience", "💼", "Professional Experience", renderExperienceSection()),
          buildCard("achievements", "🏆", "Key Achievements", renderAchievementsSection()),
          buildCard("tools", "⚙️", "Tools & Technologies", renderToolsSection()),
          buildCard("education", "🎓", "Education & Certifications", renderEducationSection()),
          buildCard("additional", "📝", "Additional Information", renderAdditionalSection())
        ];
        editorSections.innerHTML = cards.join("");
      }

      function buildCard(key, icon, title, bodyHtml) {
        const collapsed = resumeData.ui.collapsedSections[key] || false;
        return `
          <section class="editor-card ${collapsed ? "collapsed" : ""}">
            <button type="button" class="editor-card-header" data-section-key="${key}">
              <span><span class="icon">${icon}</span>${title}</span>
              <span class="arrow">▼</span>
            </button>
            <div class="editor-card-body">${bodyHtml}</div>
          </section>
        `;
      }

      function renderPhotoSection() {
        return `
          <div class="photo-dropzone" id="photoDropzone">
            <div class="photo-preview ${resumeData.photo ? "" : "hidden"} ${resumeData.photoShape === "circle" ? "circle" : resumeData.photoShape === "rounded" ? "rounded" : resumeData.photoShape === "square" ? "square" : ""}">
              ${resumeData.photo ? `<img src="${escapeHtml(resumeData.photo)}" alt="Profile photo" />` : ""}
            </div>
            <div class="help-text">Drag and drop a photo or choose one from your device.</div>
            <input id="photoInput" type="file" accept="image/*" hidden />
            <button type="button" class="btn-small primary" data-action="choose-photo">Upload Photo</button>
            <div class="shape-row">
              ${["circle", "rounded", "square", "none"].map(shape => `
                <button type="button" class="shape-btn ${resumeData.photoShape === shape ? "active" : ""}" data-shape="${shape}">${shape.charAt(0).toUpperCase() + shape.slice(1)}</button>
              `).join("")}
            </div>
            <button type="button" class="btn-small" data-action="clear-photo">Clear Photo</button>
          </div>
        `;
      }

      function renderPersonalSection() {
        return `
          <div class="field-row">
            <div class="field">
              <label for="name">Name</label>
              <input id="name" data-section="personal" data-field="name" value="${escapeHtml(resumeData.personalInfo.name)}" />
            </div>
            <div class="field">
              <label for="title">Title</label>
              <input id="title" data-section="personal" data-field="title" value="${escapeHtml(resumeData.personalInfo.title)}" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="location">Location</label>
              <input id="location" data-section="personal" data-field="location" value="${escapeHtml(resumeData.personalInfo.location)}" />
            </div>
            <div class="field">
              <label for="linkedIn">LinkedIn</label>
              <input id="linkedIn" data-section="personal" data-field="linkedIn" value="${escapeHtml(resumeData.personalInfo.linkedIn)}" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" data-section="personal" data-field="email" value="${escapeHtml(resumeData.personalInfo.email)}" />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" data-section="personal" data-field="phone" value="${escapeHtml(resumeData.personalInfo.phone)}" />
            </div>
          </div>
        `;
      }

      function renderSummarySection() {
        return `
          <div class="field">
            <label for="summaryText">Professional Summary</label>
            <textarea id="summaryText" data-section="summary" data-field="text" rows="6">${escapeHtml(resumeData.summary.text)}</textarea>
          </div>
        `;
      }

      function renderSkillsSection() {
        return `
          <div class="help-text">Add as many skill categories as needed. Each category uses a name and comma-separated items.</div>
          ${resumeData.skills.map((skill, index) => `
            <div class="sub-card">
              <div class="field">
                <label>Category Name</label>
                <input data-section="skills" data-field="category" data-index="${index}" value="${escapeHtml(skill.category)}" />
              </div>
              <div class="field">
                <label>Items</label>
                <textarea data-section="skills" data-field="items" data-index="${index}" rows="3">${escapeHtml(skill.items)}</textarea>
              </div>
            </div>
          `).join("")}
          <button type="button" class="btn-small primary" data-action="add-skill">+ Add Category</button>
        `;
      }

      function renderExperienceSection() {
        return `
          <div class="help-text">Each experience entry can contain a role, company, and bullet points (one per line).</div>
          ${resumeData.experience.map((entry, index) => `
            <div class="sub-card">
              <div class="field-row">
                <div class="field">
                  <label>Role</label>
                  <input data-section="experience" data-field="role" data-index="${index}" value="${escapeHtml(entry.role)}" />
                </div>
                <div class="field">
                  <label>Project / Company</label>
                  <input data-section="experience" data-field="company" data-index="${index}" value="${escapeHtml(entry.company)}" />
                </div>
              </div>
              <div class="field">
                <label>Bullet Points</label>
                <textarea data-section="experience" data-field="bullets" data-index="${index}" rows="5">${escapeHtml(entry.bullets)}</textarea>
              </div>
            </div>
          `).join("")}
          <button type="button" class="btn-small primary" data-action="add-experience">+ Add Experience</button>
        `;
      }

      function renderAchievementsSection() {
        return `
          <div class="field">
            <label for="achievements">Key Achievements</label>
            <textarea id="achievements" data-section="education" data-field="achievements" rows="6">${escapeHtml(resumeData.achievements)}</textarea>
          </div>
        `;
      }

      function renderToolsSection() {
        return `
          <div class="field">
            <label for="tools">Tools &amp; Technologies</label>
            <textarea id="tools" data-section="education" data-field="tools" rows="3">${escapeHtml(resumeData.tools)}</textarea>
          </div>
        `;
      }

      function renderEducationSection() {
        return `
          <div class="field">
            <label for="education">Education</label>
            <textarea id="education" data-section="education" data-field="education" rows="4">${escapeHtml(resumeData.education)}</textarea>
          </div>
          <div class="field">
            <label for="certifications">Certifications</label>
            <textarea id="certifications" data-section="education" data-field="certifications" rows="4">${escapeHtml(resumeData.certifications)}</textarea>
          </div>
        `;
      }

      function renderAdditionalSection() {
        return `
          <div class="field">
            <label for="additional">Additional Information</label>
            <textarea id="additional" data-section="additional" rows="4">${escapeHtml(resumeData.additional)}</textarea>
          </div>
        `;
      }

      function renderPreview() {
        const previewContent = document.createElement("div");
        previewContent.className = "resume-page";

        const header = document.createElement("header");
        header.className = "resume-header";

        const info = document.createElement("div");
        const name = document.createElement("h2");
        name.className = "resume-name";
        name.textContent = resumeData.personalInfo.name || "Your Name";
        const title = document.createElement("div");
        title.className = "resume-title";
        title.textContent = resumeData.personalInfo.title || "Your title";
        const contact = document.createElement("div");
        contact.className = "resume-contact";
        const contactItems = [
          resumeData.personalInfo.location && `📍 ${resumeData.personalInfo.location}`,
          resumeData.personalInfo.email && `📧 ${resumeData.personalInfo.email}`,
          resumeData.personalInfo.phone && `📞 ${resumeData.personalInfo.phone}`,
          resumeData.personalInfo.linkedIn && `🔗 ${resumeData.personalInfo.linkedIn}`
        ].filter(Boolean);
        contactItems.forEach(item => {
          const span = document.createElement("span");
          span.textContent = item;
          contact.appendChild(span);
        });
        info.append(name, title, contact);

        const photoWrap = document.createElement("div");
        photoWrap.className = `resume-photo ${resumeData.photoShape === "circle" ? "circle" : resumeData.photoShape === "rounded" ? "rounded" : resumeData.photoShape === "square" ? "square" : ""}`;
        if (resumeData.photo && resumeData.photoShape !== "none") {
          const img = document.createElement("img");
          img.src = resumeData.photo;
          img.alt = "Profile";
          photoWrap.appendChild(img);
        } else {
          photoWrap.classList.add("hidden");
        }
        header.append(info, photoWrap);
        previewContent.appendChild(header);

        if (resumeData.summary.text) {
          appendSection(previewContent, "Professional Summary", createParagraph(resumeData.summary.text));
        }

        if (resumeData.skills.some(skill => skill.category || skill.items)) {
          const skillsWrap = document.createElement("div");
          skillsWrap.className = "skills-grid";
          resumeData.skills.forEach(skill => {
            if (!skill.category && !skill.items) return;
            const skillCard = document.createElement("div");
            skillCard.className = "skill-category";
            const strong = document.createElement("strong");
            strong.textContent = skill.category || "Skill Category";
            const span = document.createElement("span");
            span.textContent = skill.items || "";
            skillCard.append(strong, span);
            skillsWrap.appendChild(skillCard);
          });
          appendSection(previewContent, "Skills", skillsWrap);
        }

        if (resumeData.experience.some(entry => entry.role || entry.company || entry.bullets)) {
          const container = document.createElement("div");
          resumeData.experience.forEach(entry => {
            if (!entry.role && !entry.company && !entry.bullets) return;
            const entryCard = document.createElement("div");
            entryCard.className = "experience-entry";
            const top = document.createElement("div");
            top.className = "experience-top";
            const role = document.createElement("div");
            role.className = "experience-role";
            role.textContent = entry.role || "Role";
            const meta = document.createElement("div");
            meta.className = "experience-meta";
            meta.textContent = entry.company || "Company";
            top.append(role, meta);
            const project = document.createElement("div");
            project.className = "experience-project";
            project.textContent = entry.company || "";
            const bullets = document.createElement("ul");
            bullets.className = "experience-bullets";
            const list = (entry.bullets || "").split(/\n+/).filter(Boolean);
            list.forEach(bullet => {
              const li = document.createElement("li");
              li.textContent = bullet.trim();
              bullets.appendChild(li);
            });
            entryCard.append(top, project, bullets);
            container.appendChild(entryCard);
          });
          appendSection(previewContent, "Professional Experience", container);
        }

        if (resumeData.achievements) {
          const list = document.createElement("div");
          list.className = "achievements-grid";
          resumeData.achievements.split(/\n+/).filter(Boolean).forEach(item => {
            const div = document.createElement("div");
            div.className = "achievement-item";
            div.textContent = item.trim();
            list.appendChild(div);
          });
          appendSection(previewContent, "Key Achievements", list);
        }

        if (resumeData.tools) {
          appendSection(previewContent, "Tools & Technologies", createParagraph(resumeData.tools));
        }

        if (resumeData.education || resumeData.certifications) {
          const container = document.createElement("div");
          if (resumeData.education) {
            const educWrap = document.createElement("div");
            const lines = resumeData.education.split(/\n+/).filter(Boolean);
            lines.forEach(line => {
              const row = document.createElement("div");
              row.className = "education-line";
              const strong = document.createElement("strong");
              strong.textContent = line;
              row.appendChild(strong);
              educWrap.appendChild(row);
            });
            container.appendChild(educWrap);
          }
          if (resumeData.certifications) {
            const certWrap = document.createElement("div");
            certWrap.className = "education-line";
            const strong = document.createElement("strong");
            strong.textContent = "Certifications";
            const span = document.createElement("span");
            span.textContent = resumeData.certifications;
            certWrap.append(strong, span);
            container.appendChild(certWrap);
          }
          appendSection(previewContent, "Education & Certifications", container);
        }

        if (resumeData.additional) {
          appendSection(previewContent, "Additional Information", createParagraph(resumeData.additional));
        }

        preview.innerHTML = "";
        preview.appendChild(previewContent);
      }

      function appendSection(container, title, content) {
        const section = document.createElement("section");
        section.className = "resume-section";
        const heading = document.createElement("h3");
        heading.className = "section-title";
        heading.textContent = title;
        section.append(heading, content);
        container.appendChild(section);
      }

      function createParagraph(text) {
        const p = document.createElement("p");
        p.className = "summary-text";
        p.textContent = text;
        return p;
      }

      function downloadPdf() {
        const name = (resumeData.personalInfo.name || "Resume").trim().replace(/\s+/g, "_");
        const element = document.querySelector(".resume-page");
        const opt = {
          margin: [10, 10, 10, 10],
          filename: `${name}_Resume.pdf`,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          pagebreak: { mode: ["avoid", "css", "legacy"] }
        };
        html2pdf().set(opt).from(element).save();
        showToast("PDF download started.");
      }

      function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        toastStack.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add("show"));
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 250);
        }, 3000);
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
